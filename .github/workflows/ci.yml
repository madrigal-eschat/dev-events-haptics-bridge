name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  commitlint:
    if: github.event_name == 'pull_request'
    uses: madrigal-eschat/dev-events-mqtt/.github/workflows/_commitlint.yml@main
    with:
      from-sha: ${{ github.event.pull_request.base.sha }}
      to-sha: ${{ github.event.pull_request.head.sha }}

  ci:
    uses: madrigal-eschat/dev-events-mqtt/.github/workflows/_rust-ci.yml@main

  coverage:
    if: github.event_name == 'pull_request'
    uses: madrigal-eschat/dev-events-mqtt/.github/workflows/_rust-coverage.yml@main
    with:
      base-ref: ${{ github.base_ref }}

  release:
    if: github.event_name == 'push'
    needs: ci
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: madrigal-eschat/dev-events-mqtt/.github/workflows/_semrel.yml@main
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

  release-assets:
    if: needs.release.outputs.released == 'true'
    needs: release
    uses: madrigal-eschat/dev-events-mqtt/.github/workflows/_rust-release-assets.yml@main
    with:
      binary-name: haptics
      release-tag: ${{ needs.release.outputs.tag }}
    permissions:
      contents: write
